{% extends "base.html" %}
{% block title %}Brand Profile - INFUX{% endblock %}
{% block content %}

<div class="inner-banner">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-3">
                <li class="breadcrumb-item"><a href="{{ url_for('brand.dashboard') }}">Dashboard</a></li>
                <li class="breadcrumb-item active">Brand Profile</li>
            </ol>
        </nav>
        <div class="section-label mb-2">Account</div>
        <h1 class="mb-1" style="font-size:clamp(1.4rem,3vw,1.9rem);">Brand <span style="background:linear-gradient(135deg,var(--violet),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Profile</span></h1>
    </div>
</div>

<div class="container py-4" style="max-width:800px;">
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4" data-aos="fade-up">
            <h6 class="fw-bold mb-4"><i class="fas fa-building me-2 text-violet"></i>Company Information</h6>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control" value="{{ br.company_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Industry</label>
                    <input type="text" name="industry" class="form-control" value="{{ br.industry or '' }}" placeholder="e.g. Retail, Tech, F&B">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Website</label>
                    <input type="url" name="website" class="form-control" value="{{ br.website or '' }}" placeholder="https://...">
                </div>
                <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" value="{{ current_user.city or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ current_user.first_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ current_user.last_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone" class="form-control" value="{{ current_user.phone or '' }}" pattern="[0-9]{10,11}">
                </div>
                <div class="col-12">
                    <label class="form-label">About / Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Tell creators about your brand...">{{ br.description or '' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Company Logo</label>
                    <input type="file" name="logo" class="form-control" accept="image/*">
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-violet rounded-pill px-5 py-2">
            <i class="fas fa-save me-2"></i>Save Profile
        </button>
    </form>
</div>
{% endblock %}
