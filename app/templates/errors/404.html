{% extends "base.html" %}
{% block title %}404 — Page Not Found | INFUX{% endblock %}
{% block content %}
<section style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
  <div class="text-center" data-aos="fade-up">
    <div style="font-family:'Syne',sans-serif;font-size:8rem;font-weight:800;line-height:1;
                background:linear-gradient(135deg,#7c3aed,#f59e0b);
                -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">404</div>
    <h2 class="fw-bold mb-3" style="font-family:'Syne',sans-serif;">Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('public.home') }}" class="btn btn-violet px-5 py-2">
      <i class="fas fa-home me-2"></i>Back to Home
    </a>
  </div>
</section>
{% endblock %}
