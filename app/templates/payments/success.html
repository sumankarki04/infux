{% extends "base.html" %}
{% block title %}Payment Successful — INFUX{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <div class="my-5" style="max-width:480px;margin:0 auto;">
        <div style="width:80px;height:80px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 8px 32px rgba(16,185,129,.3);">
            <i class="fas fa-check text-white fa-2x"></i>
        </div>
        <h3 class="fw-bold mb-2" style="font-family:'Syne',sans-serif;">Payment Successful!</h3>
        <p class="text-muted mb-4">
            Rs. {{ '{:,.0f}'.format(pmt.amount) }} paid via <strong>{{ method }}</strong>.
            {% if ref %}<br>Reference: <code>{{ ref }}</code>{% endif %}
        </p>
        <a href="{{ url_for('brand.campaign_detail', campaign_id=pmt.application.campaign_id) }}"
           class="btn btn-violet rounded-pill px-5">
            <i class="fas fa-arrow-left me-2"></i>Back to Campaign
        </a>
    </div>
</div>
{% endblock %}
