{% extends "base.html" %}
{% block title %}Payment Failed — INFUX{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <div class="my-5" style="max-width:480px;margin:0 auto;">
        <div style="width:80px;height:80px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 8px 32px rgba(239,68,68,.3);">
            <i class="fas fa-times text-white fa-2x"></i>
        </div>
        <h3 class="fw-bold mb-2" style="font-family:'Syne',sans-serif;">Payment Failed</h3>
        <p class="text-muted mb-4">
            Your {{ method }} payment was not completed. No amount was charged.
        </p>
        <a href="{{ url_for('brand.dashboard') }}"
           class="btn btn-outline-violet rounded-pill px-5">
            <i class="fas fa-arrow-left me-2"></i>Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
