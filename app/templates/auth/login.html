{% extends "base.html" %}
{% block title %}Login - INFUX{% endblock %}
{% block content %}
<div class="container py-5" style="min-height:80vh;display:flex;align-items:center;">
    <div class="row justify-content-center w-100">
        <div class="col-md-5 col-lg-4" data-aos="fade-up">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="navbar-brand d-inline-block mb-2" style="font-size:1.8rem;">INFUX</div>
                    <h3 class="mb-0">Welcome Back</h3>
                    <p style="color:rgba(255,255,255,.5);font-size:.88rem;margin-top:.3rem;">Sign in to your account</p>
                </div>
                <div class="auth-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required placeholder="you@example.com" autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-violet w-100 py-2 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>
                    <p class="text-center text-muted small mb-0">
                        No account? <a href="{{ url_for('auth.register') }}" class="fw-semibold" style="color:var(--violet);">Join INFUX</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
